<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable · Andrei & Aline</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%236B1E2E'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='28' fill='%23C9A84C'%3EA%26A%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bordeaux:#6B1E2E;--bordeaux-deep:#4A1220;--or:#C9A84C;--or-light:#E2C87A;--ivoire:#FAF6EE}
body{background:var(--bordeaux-deep);color:var(--ivoire);font-family:'Cormorant Garamond',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.ornement{font-size:4rem;color:var(--or);opacity:.3;margin-bottom:1rem}
.code{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.4em;text-transform:uppercase;color:var(--or);opacity:.6;margin-bottom:1rem}
h1{font-size:clamp(2rem,6vw,4rem);font-weight:300;font-style:italic;color:var(--ivoire);line-height:1.2;margin-bottom:1rem}
p{font-size:1.15rem;color:rgba(250,246,238,.6);line-height:1.8;max-width:440px;margin-bottom:2.5rem}
.btn{display:inline-block;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--or);border:1px solid rgba(201,168,76,.5);padding:.9rem 2.2rem;text-decoration:none;border-radius:2px;transition:all .3s}
.btn:hover{background:rgba(201,168,76,.1);border-color:var(--or)}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem auto;width:fit-content}
.divider-line{width:50px;height:1px;background:rgba(201,168,76,.3)}
</style>
</head>
<body>
  <div class="ornement">✦</div>
  <p class="code">Erreur 404</p>
  <h1>Cette page s'est égarée<br>en chemin…</h1>
  <div class="divider">
    <div class="divider-line"></div>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="rgba(201,168,76,.5)"><path d="M12 21.7C5.4 13.6 2 9 2 6a10 10 0 0 1 20 0c0 3-3.4 7.6-10 15.7z"/></svg>
    <div class="divider-line"></div>
  </div>
  <p>La page que vous cherchez n'existe pas ou a été déplacée. Revenez à l'accueil pour retrouver toutes les informations sur notre mariage.</p>
  <a href="/" class="btn">Retourner à l'accueil</a>
</body>
</html>
